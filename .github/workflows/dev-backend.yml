name: (dev) [be] Deploy to Cloudflare Worker

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/dev-backend.yml'
  workflow_dispatch:
  

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      TIMEZONE: ${{ vars.TIMEZONE }}
      D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
      D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      BUCKET_NAME: ${{ vars.BUCKET_NAME }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install project dependencies
        run: cd backend && npm install

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Update wrangler config with environment variables && delete secrets
        run: |
          cd backend
          jq \
            --arg fe "${{ vars.FRONTEND_URL }}" \
            --arg tz "${{ vars.TIMEZONE }}" \
            --arg dbid "${{ vars.D1_DATABASE_ID }}" \
            --arg dbname "${{ vars.D1_DATABASE_NAME }}" \
            --arg bucketname "${{ vars.BUCKET_NAME }}" \
            '.vars.FRONTEND_URL = $fe | .vars.TIMEZONE = $tz | .d1_databases[0].database_id = $dbid | .d1_databases[0].database_name = $dbname | .r2_buckets[0].bucket_name = $bucketname | del(.vars.JWT_SECRET)' \
            wrangler.jsonc > wrangler.local.jsonc

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: cd backend && wrangler deploy --config wrangler.local.jsonc --name voter98-backend-dev

      - name: Set secrets in Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd backend && echo "${{ secrets.JWT_SECRET }}" | wrangler secret put JWT_SECRET
